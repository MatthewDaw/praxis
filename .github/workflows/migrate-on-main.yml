# Apply database migrations on merges into main.
#
# Applies the yoyo migrations under migrations/ — the single source of truth for
# the schema. yoyo records applied migrations in its `_yoyo_migration` ledger so
# each runs exactly once; re-running only applies what's new, so it's harmless.
#
# Triggers:
#   - push to main, scoped to migration-relevant paths (schema + migrations dir
#     + the dependency/lock files that affect how migrations install/run).
#   - workflow_dispatch, for unconditional manual runs.
#
# Required GitHub secrets (configure under Settings -> Secrets and variables -> Actions):
#   - PRAXIS_DB_URL  (preferred)  — a libpq/SQLAlchemy-style Postgres DSN. When set,
#                                   db.py uses it directly and AWS is not consulted.
#   OR, as a fallback, the AWS trio so db.py can resolve the DSN from Secrets Manager
#   (secret name PRAXIS_DB_SECRET, default "praxis/knowledge-graph/db"):
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
#   - AWS_REGION     (e.g. us-east-1)
#
# SCHEMA SOURCE OF TRUTH:
#   * migrations/ is the whole schema. `0000_initial.sql` creates everything; every
#     later change (add a table/column, drop, type change, re-tenant, backfill) is a
#     new ordered migration. `python -m knowledge.serve.db` (bootstrap) IS `yoyo
#     apply` over this directory.
#   * A fresh DB replays all migrations; an existing DB only gets what's new.
#     `0000_initial` is idempotent (CREATE ... IF NOT EXISTS), so applying it to the
#     pre-existing prod DB is a safe no-op. There is no schema-diffing; parity
#     depends on every change being authored as a migration here.
#
# Some migrations may need extra secrets when they have rows to process (e.g.
# 0001_reembed_candidates re-embeds via OpenRouter and needs OPENROUTER_API_KEY
# when `candidates` still has rows — already wired into the apply step's env).
# Migrations no-op safely when there is nothing to process.
#
# KNOWN LIMITATION (not solved here): the RDS instance must be reachable from the
# GitHub-hosted runner. Runner egress IPs are large and dynamic, so the DB security
# group generally won't allow them. To make this work you'll need an alternative
# network path — e.g. a self-hosted runner inside the VPC, an SSM/SSH bastion tunnel,
# RDS Data API, or temporarily allowing the runner's egress range. Until then this
# workflow will fail at the connection step.

name: migrate-on-main

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/migrate-on-main.yml'
  workflow_dispatch: {}

# Serialize migration runs so concurrent merges never apply migrations at the same
# time. Queue (don't cancel) so every merged change still gets its migrations run.
concurrency:
  group: db-migrate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      # Connection config consumed by knowledge/serve/db.py. PRAXIS_DB_URL takes
      # precedence; the AWS trio is the Secrets Manager fallback path, which is
      # opt-in (PRAXIS_DB_ALLOW_REMOTE) so local scripts can't reach prod by
      # accident — CI explicitly allows it here.
      PRAXIS_DB_URL: ${{ secrets.PRAXIS_DB_URL }}
      PRAXIS_DB_ALLOW_REMOTE: "1"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project + deps
        run: uv sync --frozen

      - name: Apply migrations (yoyo)
        env:
          # The reembed migration embeds candidate text via OpenRouter when there
          # are rows to lift; no-ops (and so needs no key) once candidates is gone.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        # bootstrap() == `yoyo apply` over migrations/ (the schema source of truth),
        # converting the DSN scheme to postgresql+psycopg internally.
        run: uv run python -m knowledge.serve.db

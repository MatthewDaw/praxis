# ATTENTION / lost-in-the-middle case — the END-TO-END demonstration (xfail).
#
# The seeded graph is ~240 blended, rule-shaped project policies; the single
# operative rule (prefix TODOs with MD -> TODO(MD)) is buried in the exact
# MIDDLE. WholeFileReader dumps the whole graph into the agent unranked, the
# prompt does NOT cue the convention, and the needle MATCHES the distractor
# style, so the agent loses it. The deterministic check then fails -> XFAIL.
#
# Calibrated empirically against gpt-4o-mini (OpenRouter): the rule is reliably
# applied below ~80 lines and reliably LOST by ~160; 240 gives margin. A
# relevance-ranking reader that surfaces only the relevant rule fixes this ->
# XPASS. CAVEAT: this is model-calibrated — a stronger agent (e.g. Claude) may
# resist the noise and XPASS without a smarter reader. The model-independent,
# deterministic version of this contract is lost_in_middle_reader.
id: lost_in_middle
xfail: "no relevance-ranking reader: the rule is buried in ~240 unranked policies and the agent loses it (gpt-4o-mini-calibrated)"
model: "openai/gpt-4o-mini"  # calibration target; on a backend that can't serve it (e.g. Claude Code) the case is skipped, not mis-run
seed_prompt: |
  Add a single TODO comment to a file named answer.txt noting that we should add
  caching to the data-fetch layer. Write only that one TODO comment line to
  answer.txt.
target_commit: "0000000000000000000000000000000000000000"  # placeholder reference
start_commit: null
repo: null

seeded_insight:
  via_ingestor: []
  direct_to_graph:
    - "Policy 0000: ALWAYS pin every dependency to an exact version in pyproject.toml."
    - "Policy 0001: NEVER commit secrets; read them from AWS Secrets Manager."
    - "Policy 0002: ALWAYS format Python with ruff before pushing."
    - "Policy 0003: Prefix all feature branches with the Jira ticket id, like PROJ-123."
    - "Policy 0004: ALWAYS add type hints to public function signatures."
    - "Policy 0005: NEVER use raw SQL in routes; go through the repository layer."
    - "Policy 0006: ALWAYS write tests under tests/ mirroring the package layout."
    - "Policy 0007: Tag every Docker image with the git short SHA."
    - "Policy 0008: ALWAYS set a 5-second connect timeout on HTTP clients."

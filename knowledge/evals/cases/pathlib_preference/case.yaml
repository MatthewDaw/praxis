# Matthew pillar eval: ingestor-seeded style preference steers file I/O choices.
# Expected to FAIL under offline FakeRunner until a real agent run.
id: pathlib_preference
seed_prompt: |
  Write a Python function named `read_config` that accepts a file path string
  and returns the file contents as a string. Output only the function source.
target_commit: "0000000000000000000000000000000000000000"
start_commit: null
repo: null

seeded_insight:
  via_ingestor:
    - "Prefer pathlib over os.path for all new file I/O in this codebase."

deterministic_checks:
  - name: uses_pathlib
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: "pathlib"
  - name: produced_output
    ref: "knowledge.evals.deterministic_checks.builds:output_nonempty"

rubric:
  id: pathlib_preference_v1
  items:
    - id: pathlib_used
      criterion: "The function uses pathlib (Path) rather than os.path for file access."
      weight: 2.0
    - id: readable
      criterion: "The function is clear and handles a path string argument."
      weight: 1.0

# Component eval: ingestion only. Feeds raw input through Ingestor.ingest
# (synthesis -> write) and reads the resulting graph — no agent. Deterministic
# under the no-LLM passthrough ingestor.
id: ingestion_distill
component: ingestion

seeded_insight:
  via_ingestor:
    - "The test suite runs with `uv run pytest`."

deterministic_checks:
  - name: ingested_lesson
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: "uv run pytest"

# AE5 — gray-zone synonymous values, no contradiction. Two facts fill the SAME
# functional slot (the voltaic pile's significance / what it was) with values that are
# synonymous rather than incompatible: "first electric battery" vs "early electric
# battery". The structural detector sees same subject + functional attribute + non-
# identical values and escalates to the narrow gray-zone ClaimValueJudge, which rules
# the values synonymous -> suppress. (Precision-first: a fuzzy/synonym verdict never
# becomes an edge.)
#
# This is the gray-zone arm exercising the value judge. Component eval (no agent);
# vector substrate runs the real write policy. Replays from the committed claim_extract
# + conflict verdict cassettes + embedding fixture offline (no live calls).
#
# Desired behavior: NO contradiction flagged; both facts kept verbatim.
id: claim_gray_zone_synonym
component: knowledge_graph
substrate: vector
embedder: cached
conflict_model: openai/gpt-4o-mini

seeded_insight:
  via_ingestor: []
  direct_to_graph:
    - "The voltaic pile was the first electric battery."
    - "The voltaic pile was an early electric battery."

deterministic_checks:
  # Precision: synonymous same-slot values resolve to no contradiction (gray-zone judge).
  - name: no_contradiction_flagged
    ref: "knowledge.evals.deterministic_checks.text:regex_absent"
    params:
      pattern: "(?i)CONTRADICTION"
  - name: both_facts_kept
    ref: "knowledge.evals.deterministic_checks.text:requires_all_substrings"
    params:
      texts:
        - "The voltaic pile was the first electric battery."
        - "The voltaic pile was an early electric battery."

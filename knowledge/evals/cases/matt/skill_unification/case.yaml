    ---

    name: ce-worktree

    description: Ensure work happens in an isolated git worktree without disturbing the current checkout. Use when starting work that should stay isolated, or when `ce-work` or `ce-code-review` offers a worktree option. Detects existing isolation first, prefers the harness''s native worktree tool, and falls back to plain git.

    ---


    # Worktree Isolation


    Ensure the current work happens in an isolated workspace, without disturbing the user''s main checkout. Most coding harnesses now create a worktree by default at session start, so the common case is that **isolation already exists** — detect that first and do not create a redundant one.


    Order of operations: **detect existing isolation -> prefer a native worktree tool -> fall back to plain git.** Never create a worktree the harness cannot see.


    ## Step 0: Detect existing isolation


    Before creating anything, check whether the current directory is already a linked worktree. Compare the **resolved absolute** git dir against the **resolved absolute** common git dir — resolve each to an absolute path first and compare those, not the raw `git rev-parse` output. Git mixes absolute and relative forms depending on the current directory (from a subdirectory of a normal checkout, `--git-dir` comes back absolute while `--git-common-dir` may be relative), so a raw string compare yields a false "already isolated":


    ```bash

    git rev-parse --absolute-git-dir                     # absolute git dir for this worktree

    (cd "$(git rev-parse --git-common-dir)" && pwd -P)   # absolute shared (common) git dir

    ```


    If the two absolute paths are **equal**, this is a normal checkout — continue to Step 1.


    If they **differ**, you are in a linked worktree *or* a submodule. Distinguish them:


    ```bash

    git rev-parse --show-superproject-working-tree

    ```


    - **Non-empty** output -> you are in a submodule; treat it as a normal checkout and continue to Step 1.

    - **Empty** output -> you are **already in an isolated worktree**. Report the worktree path (`git rev-parse --show-toplevel`) and current branch, and **work in place**. Do not create another worktree — a worktree-from-worktree lands in the wrong tree and is invisible to the harness that made the current one.


    ## Step 1: Prefer the harness''s native worktree tool


    If the harness provides a native worktree primitive — for example an `EnterWorktree` / `WorktreeCreate` tool, a `/worktree` command, or a `--worktree` flag — use it and stop. Native tools place, track, and clean up the worktree so the harness can manage it. A behind-the-back `git worktree add` creates phantom state the harness cannot see, navigate to, or clean up.


    ## Step 2: Git fallback


    Only when there is no native tool **and** Step 0 found no existing isolation.


    1. **Run from the repo root.** The `.worktrees/` and `.gitignore` paths below are repo-root-relative, but the skill runs from the user''s current directory, which may be a subdirectory — so move to the root first: `cd "$(git rev-parse --show-toplevel)"`. Without this, `.worktrees/<branch>` and the `.gitignore` edit would land in the subdirectory (e.g. `src/.worktrees/...`, `src/.gitignore`) instead of at the repo root.

    2. Choose a meaningful branch name from the work description (e.g. `feat/login`, `fix/email-validation`) — avoid opaque auto-generated names. Pick a base branch (default: origin''s default branch, else `main`).

    3. **Ensure `.worktrees/` is gitignored before creating anything**, so worktree contents are never committed: check `git check-ignore -q .worktrees/` — **with the trailing slash**, so an existing directory-only `.worktrees/` rule is honored even before the directory exists (`git check-ignore .worktrees` without the slash would miss it and dirty a correctly-configured repo). If it is not ignored, add a `.worktrees/` line to `.gitignore`.

    4. Best-effort refresh the base branch without disturbing the current checkout: `git fetch origin <from-branch>`. This is **non-fatal** — if it errors (no `origin` remote, a differently-named remote, or a local-only branch), do not abort; continue to the next step and use the local ref.

    5. Create the worktree from the remote base when available, else the local ref: `git worktree add -b <branch-name> .worktrees/<branch-name> origin/<from-branch>`. If `origin/<from-branch>` does not exist, use the local `<from-branch>` ref instead.

    6. Switch into it: `cd .worktrees/<branch-name>`.


    If `git worktree add` fails with a sandbox or permission error, the requested isolation could not be created. This needs a **blocking** user decision before touching the current checkout — do not silently continue there (the user chose isolation specifically to avoid it, especially when `ce-work` / `ce-code-review` routed here for the worktree option). Report the failure and ask via the platform''s blocking question tool: `AskUserQuestion` in Claude Code (call `ToolSearch` with `select:AskUserQuestion` first if its schema isn''t loaded), `request_user_input` in Codex, `ask_question` in Antigravity CLI (`agy`), `ask_user` in Pi (via the `pi-ask-user` extension) — offering options such as "work in the current checkout" vs "stop and resolve the permission issue". If no blocking tool exists in the harness or the call errors, present the numbered options in chat and wait for the reply; never skip the confirmation. Only work in the current checkout on explicit confirmation, and do not retry alternative paths automatically.


    ## Other worktree operations


    Use `git` directly — no wrapper is needed:


    ```bash

    git worktree list                          # list worktrees

    git worktree remove .worktrees/<branch>    # remove a worktree

    cd .worktrees/<branch>                     # switch to a worktree

    cd "$(git rev-parse --show-toplevel)"      # return to the current checkout root

    ```


    ## When to create a worktree


    Create one (Step 1/2) only when you are **not** already isolated and you need a separate workspace:


    - Reviewing a PR while keeping the current checkout free for other work

    - Running multiple features in parallel without branch-switching overhead


    Do not create a worktree for single-task work that can happen on a branch in the current checkout — and never when Step 0 shows you are already in one.


    ## Integration


    `ce-work` and `ce-code-review` offer this skill as an option. When the user selects "worktree" in those flows, run Step 0 first: if the work is already isolated, proceed in place; otherwise create one (native tool preferred) with a meaningful branch name derived from the work description.


    ## Troubleshooting


    **"Worktree already exists"**: the path is in use. Switch to it (`cd .worktrees/<branch>`) or remove it (`git worktree remove .worktrees/<branch>`) before recreating.


    **"Cannot remove worktree: it is the current worktree"**: `cd` out of the worktree first, then `git worktree remove`.

    '
  - "# source: compound-engineering/lfg\n\n---\nname: lfg\ndescription: Run the full autonomous engineering pipeline end-to-end (plan, work, code review, test, commit, push, open PR, watch CI, fix CI failures until green). Use only when the user explicitly requests hands-off execution of a software task and provides a feature description; do not auto-route casual conversation here.\nargument-hint: \"[feature description]\"\n---\n\nCRITICAL: You MUST execute every step below IN ORDER. Do NOT skip any required step. Do NOT jump ahead to coding or implementation. The plan phase (step 1) MUST be completed and verified BEFORE any work begins. Violating this order produces bad output.\n\nWhen invoking any skill referenced below, resolve its name against the available-skills list the host platform provides and use that exact entry. Some platforms list skills under a plugin namespace (e.g., `compound-engineering:ce-plan`); others list the bare name. Invoking a short-form guess that isn't in the list will fail — always match a listed entry verbatim before calling the Skill/Task tool.\n\n1. Invoke the `ce-plan` skill with `$ARGUMENTS`.\n\n   GATE: STOP. If ce-plan reported the task is non-software and cannot be processed in pipeline mode, stop the pipeline and inform the user that LFG requires software tasks. Otherwise, verify that the `ce-plan` workflow produced a plan file in `docs/plans/`. If no plan file was created, invoke `ce-plan` again with `$ARGUMENTS`. Do NOT proceed to step 2 until a written plan exists. **Record the plan file path** — it will be passed to ce-code-review in step 4.\n\n2. Invoke the `ce-work` skill.\n\n   GATE: STOP. Verify that implementation work was performed - files were created or modified beyond the plan. Do NOT proceed to step 3 if no code changes were made.\n\n3. Invoke the `ce-simplify-code` skill on the branch diff.\n\n   This runs before review so the code-review in step 4 covers the simplified code. **Skip** this step when the change is docs-only (only markdown/docs paths changed) or trivial (roughly under 10 changed lines). Otherwise let `ce-simplify-code` resolve the branch-diff scope itself; it preserves behavior and runs the test suite.\n\n   Do not commit in this step. `ce-simplify-code` leaves its changes in the working tree; step 4's review scopes the working tree (uncommitted changes included), and step 8's `ce-commit-push-pr` commits whatever remains. Committing here would sweep any still-uncommitted `ce-work` edits into a misleading `refactor` commit and could stall on a tree that never goes clean.\n\n4. Invoke the `ce-code-review` skill with `mode:agent plan:<plan-path-from-step-1>`.\n\n   Pass the plan file path from step 1 so ce-code-review can verify requirements completeness. Read the **Actionable Findings** summary the skill emits.\n\n   `mode:agent` is report-only **by design** — it surfaces findings but never edits the tree; LFG applies the eligible ones in step 5. When narrating progress to the user, frame this as \"review found X → applied X in step 5,\" not as \"code review did not auto-fix.\" A report-only review followed by an LFG-applied fix is the intended contract, not a gap.\n\n5. **Apply and persist review fixes** (REQUIRED after step 4, before residual handoff)\n\n   Load `references/review-followup.md` and execute its apply step (mechanical apply + commit/push when changes exist). Do not proceed to the residual handoff, run browser tests, or output DONE while eligible review fixes remain only in the working tree uncommitted.\n\n6. **Autonomous residual handoff** (only when step 4 reported one or more actionable `downstream-resolver` findings not applied in step 5; skip when it reported `Actionable findings: none.`)\n\n   Do not prompt the user. This step embraces the autopilot contract: residuals must become durable before DONE, but the agent never stops to ask.\n\n   1. Load `references/tracker-defer.md` in **non-interactive mode**. Pass the residual actionable findings from step 4/5 (or the run artifact when the summary was truncated).\n   2. Collect the structured\
    \ return: `{ filed: [...], failed: [...], no_sink: [...] }`.\n   3. Compose a `## Residual Review Findings` markdown section from the structured return:\n      - For each item in `filed`: a bullet with severity, file:line, title, and a link to the tracker ticket URL.\n      - For each item in `failed`: a bullet with severity, file:line, title, and the failure reason (e.g., `Defer failed: gh returned 401 — tracker unavailable`).\n      - For each item in `no_sink`: a bullet with severity, file:line, and title inlined verbatim so the PR body or fallback file is the durable record.\n   4. Detect the current branch's open PR without prompting:\n\n      ```bash\n      gh pr view --json number,url,body,state\n      ```\n\n   5. If an open PR exists, update it directly with `gh`; do not load any confirmation-driven PR update skill. Append or replace the `## Residual Review Findings` section in the current PR body, write the new body to an OS temp file, then run:\n\n      ```bash\n      gh pr edit PR_NUMBER --body-file BODY_FILE\n      ```\n\n   6. If no open PR exists, create a tracked fallback file at `docs/residual-review-findings/<branch-or-head-sha>.md` containing the composed section and the source PR-review run context. Stage only that file, commit it with `docs(review): record residual review findings`, and push the current branch. If an upstream exists, run `git push`. If no upstream exists, resolve a writable remote dynamically: prefer `origin` when present, otherwise use `git remote` and choose the first configured remote. Then run `git push --set-upstream <remote> HEAD`. This is the durable no-PR sink. Do not output DONE until either the existing PR body has been updated or this fallback file commit has been pushed. If both paths fail, stop and report the failed commands; do not silently proceed.\n\n   Never block DONE on tracker filing failures once residuals have been durably recorded. A `no_sink` outcome is success only when the findings are present in the PR body or in the pushed fallback file.\n\n7. Invoke the `ce-test-browser` skill with `mode:pipeline`.\n\n8. Invoke the `ce-commit-push-pr` skill.\n\n   This commits any remaining changes, pushes the branch, and opens a pull request. If step 6 already opened a PR (check with `gh pr view --json number,url,state 2>/dev/null`), skip PR creation but still commit and push any uncommitted changes.\n\n9. **CI watch and autofix loop** (only when an open PR exists for the current branch)\n\n   Detect the PR; if none exists or `gh` is unavailable, skip this step entirely and proceed to step 10.\n\n   ```bash\n   gh pr view --json number,url,state\n   ```\n\n   For up to **3 fix iterations**, repeat:\n\n   1. Wait for CI to complete:\n\n      ```bash\n      gh pr checks --watch\n      ```\n\n      If the command exits 0, all checks passed. Break out of the loop and proceed to step 10.\n\n      If it exits non-zero, one or more checks failed. Continue to (2).\n\n   2. Identify failing checks and pull their failure logs. Use `gh pr checks --json name,state,conclusion,workflow,link` to enumerate failures, then for each failing check read the run logs:\n\n      ```bash\n      gh run view <run-id> --log-failed\n      ```\n\n      where `<run-id>` is parsed from the check's details URL or workflow run.\n\n   3. Read the failure logs, identify the root cause, and apply a fix in the working tree. Do NOT weaken, skip, or mock the failing assertion to make it pass — repair the actual issue. If the failure is a flaky test that has no fix path, document that as the residual outcome below rather than retrying without a code change.\n\n   4. Stage only the files you changed, commit, and push:\n\n      ```bash\n      git add <changed-files>\n      git commit -m \"fix(ci): <one-line summary of the failure repaired>\"\n      git push\n      ```\n\n   5. Return to iteration (1) with the next attempt counter.\n\n   GATE: STOP iterating after 3 failed attempts. If CI is still red after 3 fix cycles:\n\n   - Compose a `## CI Failures Unresolved` markdown section listing each remaining failing\
    \ check, the failure summary, and the run/check URL.\n   - Append or replace this section in the PR body, write the new body to an OS temp file, then run:\n\n     ```bash\n     gh pr edit PR_NUMBER --body-file BODY_FILE\n     ```\n\n   - Do NOT continue looping. The autopilot contract is \"make residuals durable, then exit.\" Proceed to step 10.\n\n10. Output `<promise>DONE</promise>` when complete\n\nStart with step 1 now. Remember: plan FIRST, then work. Never skip the plan.\n"
deterministic_checks:
- name: produced_catalog
  ref: knowledge.evals.deterministic_checks.builds:output_nonempty
  params: {}
- name: wrote_unified_skills
  ref: knowledge.evals.deterministic_checks.builds:writes_file
  params:
    path: unified-skills.md
- name: covers_planning
  ref: knowledge.evals.deterministic_checks.text:regex_matches
  params:
    pattern: (?i)plan
- name: covers_code_review
  ref: knowledge.evals.deterministic_checks.text:regex_matches
  params:
    pattern: (?i)code.?review|review
- name: covers_design_review
  ref: knowledge.evals.deterministic_checks.text:regex_matches
  params:
    pattern: (?i)design.?review|design
- name: covers_debugging
  ref: knowledge.evals.deterministic_checks.text:regex_matches
  params:
    pattern: (?i)debug|investigat
- name: covers_commit_pr
  ref: knowledge.evals.deterministic_checks.text:regex_matches
  params:
    pattern: (?i)commit|pull request|\bpr\b
- name: covers_ship_release
  ref: knowledge.evals.deterministic_checks.text:regex_matches
  params:
    pattern: (?i)ship|release|deploy
rubric:
  id: matt_skill_unification_v1
  items:
  - id: coverage
    criterion: The unified catalog accounts for the major capabilities present across BOTH toolkits — at minimum planning, code review, design review, debugging/investigation, committing/opening PRs, and shipping/releasing — without dropping whole capability areas.
    weight: 2.0
  - id: dedup_merge
    criterion: Skills that do the same job across the two toolkits are MERGED into a single unified skill (e.g. gstack `review`/`devex-review` with compound-engineering `ce-code-review`; gstack `ship` with `ce-commit`/`ce-commit-push-pr`) rather than listed twice, while genuinely distinct skills are kept separate. The result is noticeably more unified than the raw concatenation of both sets.
    weight: 2.0
  - id: provenance
    criterion: Each unified skill records its provenance — which source toolkit(s) (gstack and/or compound-engineering) and which original skill name(s) it derives from.
    weight: 1.0
  - id: grounded
    criterion: Every entry traces to skills that were actually ingested from the two toolkits. No fabricated skills or capabilities that neither toolkit provides.
    weight: 1.5
  - id: coherent_structure
    criterion: Entries follow one consistent schema (name, use-when, what-it-does, provenance) and the catalog reads as a single coherent set rather than two stapled-together lists.
    weight: 1.0

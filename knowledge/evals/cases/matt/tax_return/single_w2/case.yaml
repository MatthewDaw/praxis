50 up to $197,300\n\n  MARRIED FILING JOINTLY 2025 brackets:\n    - 10% on taxable income from $0 to $23,850\n    - 12% on the amount over $23,850 up to $96,950\n    - 22% on the amount over $96,950 up to $206,700\n    - 24% on the amount over $206,700 up to $394,600\n\n  HEAD OF HOUSEHOLD 2025 brackets:\n    - 10% on taxable income from $0 to $17,000\n    - 12% on the amount over $17,000 up to $64,850\n    - 22% on the amount over $64,850 up to $103,350\n    - 24% on the amount over $103,350 up to $197,300\n\nLine 25 — Federal income tax withheld.\n  Enter the amount from Box 2 of your W-2 (\"Federal income tax withheld\"). Add\n  the Box 2 amounts from all the W-2s on the return.\n\nLine 33 — Total payments.\n  For a wage-only return this equals Line 25.\n\nLine 34 — Overpayment / Refund.\n  If Line 33 (total payments) is MORE than Line 16 (tax), you overpaid. Subtract\n  Line 16 from Line 33 — that difference is your REFUND.\n\nLine 37 — Amount you owe.\n  If Line 16 (tax) is MORE than Line 33 (total payments), subtract Line 33 from\n  Line 16 — that difference is the amount you OWE. A return results in either a\n  refund (Line 34) or an amount owed (Line 37), never both.\n\nWhen you finish, the completed return should clearly state: filing status, total\nincome, AGI, the standard deduction taken, taxable income, the computed tax,\ntotal federal tax withheld, and the final refund or amount owed.\n"

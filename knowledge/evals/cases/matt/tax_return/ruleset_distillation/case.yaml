seed_prompt: 'Give the complete TY2025 federal Form 1040 rules: the standard deduction and the full 10%-37% ordinary-income bracket schedule for every filing status (Single, Married filing jointly, Married filing separately, Head of household), how the per-bracket tax is summed, which W-2 boxes map to which 1040 lines, and the line-by-line flow from wages through taxable income to the refund or amount owed.'
seeded_insight:
  via_ingestor:
  - 'TY2025 Form 1040 standard deduction by filing status: Single $15,750; Married filing jointly $31,500; Married filing separately $15,750; Head of household $23,625. Enter on Form 1040 line 12.'
  - TY2025 standard deduction for a Single filer is $15,750 (Form 1040 line 12).
  - TY2025 standard deduction for Married filing jointly is $31,500 (Form 1040 line 12).
  - TY2025 standard deduction for Married filing separately is $15,750 (Form 1040 line 12).
  - TY2025 standard deduction for Head of household is $23,625 (Form 1040 line 12).
  - A taxpayer who is age 65 or older OR blind gets an additional standard deduction on top of the basic amount; a taxpayer who is both gets it twice. Most filers under 65 and not blind use only the basic standard deduction.
  - On Form 1040 line 12 a taxpayer claims the LARGER of the standard deduction or total itemized deductions (Schedule A). Most W-2 wage earners take the standard deduction because their itemized deductions are smaller.
  - 'TY2025 ordinary income tax brackets, Single: 10% up to $11,925; 12% $11,925-$48,475; 22% $48,475-$103,350; 24% $103,350-$197,300; 32% $197,300-$250,525; 35% $250,525-$626,350; 37% above $626,350.'
  - 'TY2025 ordinary income tax brackets, Married filing jointly: 10% up to $23,850; 12% $23,850-$96,950; 22% $96,950-$206,700; 24% $206,700-$394,600; 32% $394,600-$501,050; 35% $501,050-$751,600; 37% above $751,600.'
  - 'TY2025 ordinary income tax brackets, Married filing separately: 10% up to $11,925; 12% $11,925-$48,475; 22% $48,475-$103,350; 24% $103,350-$197,300; 32% $197,300-$250,525; 35% $250,525-$375,800; 37% above $375,800. (MFS thresholds match Single except in the top two brackets.)'
  - 'TY2025 ordinary income tax brackets, Head of household: 10% up to $17,000; 12% $17,000-$64,850; 22% $64,850-$103,350; 24% $103,350-$197,300; 32% $197,300-$250,500; 35% $250,500-$626,350; 37% above $626,350.'
  - 'Federal income tax brackets are marginal: each rate applies only to the portion of taxable income that falls within that bracket''s range, not to the entire income. Sum the tax from each bracket to get total tax.'
  - Single filing status applies to a taxpayer who is unmarried, divorced, or legally separated on the last day of the tax year and does not qualify for head of household.
  - Married couples may file jointly (MFJ), combining both spouses' income on one return, or separately (MFS) on two returns. MFJ usually yields a lower combined tax than MFS.
  - Head of household applies to an unmarried taxpayer who paid more than half the cost of keeping up a home for a qualifying person (such as a dependent child) for more than half the year. It gives a larger standard deduction and wider brackets than Single.
  - A taxpayer under 65 generally must file a 2025 federal return if their gross income is at least the standard deduction for their filing status (e.g. $15,750 for Single). Filing is also worthwhile to claim a refund of withheld tax.
  - W-2 box 1 reports taxable wages, tips, and other compensation. It can be lower than boxes 3 and 5 when the employee made pre-tax contributions such as a 401(k). Use box 1 for Form 1040 line 1a, not box 3 or 5.
  - W-2 box 2 reports federal income tax already withheld from the employee's pay. It is entered on Form 1040 line 25a and counts as a payment toward the year's tax.
  - Form 1040 line 1a = total W-2 box 1 wages. Other income (interest, etc.) is added on later lines; line 9 = total income (the sum of all income lines).
  - Form 1040 line 11 = adjusted gross income (AGI) = total income (line 9) minus adjustments to income from Schedule 1. With only W-2 wages and no adjustments, AGI equals total income.
  - Form 1040 line 15 = taxable income = AGI (line 11) minus the deduction on line 12 (standard or itemized). Taxable income is never less than zero.
  - Form 1040 line 16 = tax on taxable income. The IRS Tax Table is used when taxable income is under $100,000; the Tax Computation Worksheet (the bracket schedule) is used at $100,000 and above. Both implement the same marginal brackets.
  - 'Amounts on Form 1040 may be rounded to whole dollars: drop amounts under 50 cents and increase amounts from 50 to 99 cents to the next dollar.'
  - Form 1040 line 24 = total tax. Line 25a = federal income tax withheld from W-2 box 2. Line 33 = total payments (withholding plus any credits and estimated payments).
  - Compare Form 1040 line 33 (total payments) with line 24 (total tax). If payments exceed tax, the difference is your refund (line 34). If tax exceeds payments, you owe the difference (line 37).
  - 'Form 1040 line flow: Line 1a = total W-2 box 1 wages. Line 9 = total income. Line 11 = adjusted gross income (AGI). Line 12 = standard deduction. Line 15 = taxable income (line 11 minus line 12, not below zero). Line 16 = tax computed on taxable income. Line 22/24 = total tax. Line 25a = federal income tax withheld from W-2 box 2. Line 33 = total payments. If line 33 > line 24, line 34 is the refund; otherwise line 37 is the amount you owe.'

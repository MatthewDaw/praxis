  - "Form 1040 (Simplified) — Instructions for Tax Year 2025\n\nThis guide explains how to fill out a simplified U.S. individual income tax\nreturn (Form 1040) for a wage earner whose only income is from one or more W-2\njobs (no other income). Work the lines in order; each line tells you exactly\nwhat to enter.\n\nLine 1a — Wages, salaries, and tips.\n  Enter the amount from Box 1 of your W-2 (\"Wages, tips, other compensation\").\n  If a return has more than one W-2 (for example, a married couple filing\n  jointly with a W-2 each), add all the Box 1 amounts together.\n\nLine 9 — Total income.\n  For a return with only W-2 wages and no other income (no interest, dividends,\n  self-employment, or capital gains), Total income equals Line 1a.\n\nLine 11 — Adjusted gross income (AGI).\n  With no above-the-line adjustments, AGI equals Line 9.\n\nLine 12 — Standard deduction.\n  Most filers take the standard deduction. For tax year 2025 the standard\n  deduction by filing status is:\n    - Single ............................. $15,750\n    - Married filing jointly ............. $31,500\n    - Head of household .................. $23,625\n    - Married filing separately .......... $15,750\n  Enter the standard deduction for your filing status unless you are itemizing.\n\nLine 15 — Taxable income.\n  Subtract Line 12 (the standard deduction) from Line 11 (AGI). If the result is\n  zero or less, enter 0. This is your taxable income.\n\nLine 16 — Tax.\n  Compute the tax on your Line 15 taxable income using the 2025 tax-rate\n  schedule for your filing status. Apply each rate only to the portion of income\n  that falls in that bracket (marginal rates), then add the pieces together.\n  Round the final tax to the nearest whole dollar.\n\n  SINGLE (and married filing separately) 2025 brackets:\n    - 10% on taxable income from $0 to $11,925\n    - 12% on the amount over $11,925 up to $48,475\n    - 22% on the amount over $48,475 up to $103,350\n    - 24% on the amount over $103,350 up to $197,300\n\n  MARRIED FILING JOINTLY 2025 brackets:\n    - 10% on taxable income from $0 to $23,850\n    - 12% on the amount over $23,850 up to $96,950\n    - 22% on the amount over $96,950 up to $206,700\n    - 24% on the amount over $206,700 up to $394,600\n\n  HEAD OF HOUSEHOLD 2025 brackets:\n    - 10% on taxable income from $0 to $17,000\n    - 12% on the amount over $17,000 up to $64,850\n    - 22% on the amount over $64,850 up to $103,350\n    - 24% on the amount over $103,350 up to $197,300\n\nLine 25 — Federal income tax withheld.\n  Enter the amount from Box 2 of your W-2 (\"Federal income tax withheld\"). Add\n  the Box 2 amounts from all the W-2s on the return.\n\nLine 33 — Total payments.\n  For a wage-only return this equals Line 25.\n\nLine 34 — Overpayment / Refund.\n  If Line 33 (total payments) is MORE than Line 16 (tax), you overpaid. Subtract\n  Line 16 from Line 33 — that difference is your REFUND.\n\nLine 37 — Amount you owe.\n  If Line 16 (tax) is MORE than Line 33 (total payments), subtract Line 33 from\n  Line 16 — that difference is the amount you OWE. A return results in either a\n  refund (Line 34) or an amount owed (Line 37), never both.\n\nWhen you finish, the completed return should clearly state: filing status, total\nincome, AGI, the standard deduction taken, taxable income, the computed tax,\ntotal federal tax withheld, and the final refund or amount owed.\n"

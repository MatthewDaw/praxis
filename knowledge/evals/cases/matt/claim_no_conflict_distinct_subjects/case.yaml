# AE2 — distinct subjects, no contradiction. "Galvani discovered animal electricity"
# and "Volta disproved animal electricity" are topically entangled (high cosine, the
# recall gate surfaces them) and even superficially oppositional (discovered vs
# disproved), but they assert claims about DIFFERENT subjects (Galvani's act vs Volta's
# act). Two historical figures disagreeing is not a graph contradiction (origin scope
# boundary). The claim extractor assigns different subjects, so the facts never share a
# functional slot and the structural detector records nothing.
#
# This is a hard-negative precision case. Component eval (no agent); vector substrate
# runs the real write policy. Replays from the committed claim_extract + conflict
# verdict cassettes + embedding fixture offline (no live calls).
#
# Desired behavior: NO contradiction flagged; both facts kept verbatim.
id: claim_no_conflict_distinct_subjects
component: knowledge_graph
substrate: vector
embedder: cached
conflict_model: openai/gpt-4o-mini

seeded_insight:
  via_ingestor: []
  direct_to_graph:
    - "Luigi Galvani discovered animal electricity."
    - "Alessandro Volta disproved the theory of animal electricity."

deterministic_checks:
  # Precision: distinct subjects never share a slot -> no structural contradiction.
  - name: no_contradiction_flagged
    ref: "knowledge.evals.deterministic_checks.text:regex_absent"
    params:
      pattern: "(?i)CONTRADICTION"
  - name: both_facts_kept
    ref: "knowledge.evals.deterministic_checks.text:requires_all_substrings"
    params:
      texts:
        - "Luigi Galvani discovered animal electricity."
        - "Alessandro Volta disproved the theory of animal electricity."

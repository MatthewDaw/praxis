# HARD-NEGATIVE for the merge/augment path (precision arm of `augment_additive_merge`).
# Two governance rules that share a key phrase but are DISTINCT and COMPATIBLE:
#   A (admission-time): "A requirement is admitted to a plan only if it carries a binary
#       acceptance condition."
#   B (done-time):      "A plan is complete only when every requirement has a binary
#       acceptance condition and no contradiction remains unresolved."
#
# They overlap heavily in vocabulary ("binary acceptance condition", "plan", "requirement")
# and sit at high cosine, so the recall gate surfaces them as candidates. But they are NOT
# the same lesson (admission gate vs completion gate) and NOT additive notes about one
# subject (unlike "likes cheese pizza" + "loves chicken pizza", which SHOULD merge in
# augment_additive_merge). They must both survive as two distinct active facts.
#
# Observed live (2026-06-25, agent-factory org via MCP, default on_conflict=auto_resolve):
# seeding these two rules in a batch left BOTH in `rejected` with their distinct content
# preserved in NO surviving active fact — silent loss of two distinct governance rules.
# That is the failure this case pins: the Deduper/Augmenter over-collapses distinct rules
# that merely share vocabulary (the prose analog of the H6 tabular over-merge, loss-point B).
#
# Desired behavior: NO merge, NO contradiction, NO drop — the graph ends with BOTH rules
# kept verbatim as two distinct active facts. (Contrast augment_additive_merge, where the
# correct outcome IS a single merged fact; the judge must tell "additive about one subject"
# from "two different rules sharing a term".)
#
# Component eval (no agent); vector substrate runs the real write policy
# (Redactor -> Deduper -> Augmenter -> structural/semantic conflict detectors). Replays from
# the committed augment + claim_extract + conflict verdict cassettes + embedding fixture
# offline (no live calls).
#
# On CURRENT code this is expected RED (one or both rules merged/dropped); it goes GREEN once
# the merge/augment judge stops collapsing distinct-but-overlapping rules.
id: augment_no_merge_distinct_rules
component: knowledge_graph
substrate: vector
embedder: cached  # real vectors so the recall gate surfaces the look-alike candidate
augment_model: openai/gpt-4o-mini  # AugmentJudge verdict replayed from the committed cassette
conflict_model: openai/gpt-4o-mini

seeded_insight:
  via_ingestor: []
  direct_to_graph:
    - "A requirement is admitted to a plan only if it carries a binary acceptance condition."
    - "A plan is complete only when every requirement has a binary acceptance condition and no contradiction remains unresolved."

deterministic_checks:
  # Both distinct rules survive verbatim — neither dropped to `rejected` nor merged away into a
  # synthesized single fact. Distinctive, non-overlapping fragments of each rule must both be
  # present (a merge would synthesize new text and lose at least one of these fragments).
  - name: both_rules_kept_distinct
    ref: "knowledge.evals.deterministic_checks.text:requires_all_substrings"
    params:
      texts:
        - "admitted to a plan only if it carries a binary acceptance condition"
        - "complete only when every requirement has a binary acceptance condition and no contradiction remains unresolved"
  # ...AND as two SEPARATE facts, not one concatenated block (substring presence alone
  # would still pass on a silent over-merge that joins both rules into one fact).
  - name: two_distinct_facts
    ref: "knowledge.evals.deterministic_checks.graph:distinct_fact_blocks"
    params:
      min_blocks: 2
  # They are compatible (admission gate vs completion gate), not a contradiction.
  # Match only the flagged-pair summary prefix the harness renders ("CONTRADICTION: ...
  # contradicts ..."), NOT the literal word — rule B's own text says "no contradiction
  # remains unresolved", so a case-insensitive bare-word match would false-positive.
  - name: no_contradiction_flagged
    ref: "knowledge.evals.deterministic_checks.text:regex_absent"
    params:
      pattern: "CONTRADICTION:"

# Architecture: Learning moment → LLM distillation → Knowledge Graph → get context → Eval Harness
# Demo acts: 1 + 3
# Mock candidate: cand_1 — TypeScript Exhaustive Switch Pattern
# Provenance target: logs/session_20260615.jsonl:88
id: quirky_exhaustive_switch
seed_prompt: |
  Create a new file status.ts with a function `statusLabel(status: "open" | "closed" | "pending")`
  that returns a human-readable label string. Use a switch statement on the status argument.
  Do not create any other files.
target_commit: "0000000000000000000000000000000000000000"
start_commit: null
repo: null

seeded_insight:
  via_ingestor:
    - >-
      You missed the default case — assign to `never` so we get a compile error
      when someone adds a variant.
  direct_to_graph:
    - >-
      When using a switch statement on a discriminated union or enum, include a
      default case that assigns the value to a variable of type `never`. This
      ensures the compiler will throw an error if a new variant is added to the
      union but not handled in the switch.

deterministic_checks:
  - name: uses_never_exhaustiveness
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: "never"
  - name: has_switch
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: "switch"
  - name: produced_output
    ref: "knowledge.evals.deterministic_checks.builds:output_nonempty"

rubric:
  id: exhaustive_switch_v1
  items:
    - id: exhaustiveness
      criterion: >-
        The switch includes a default branch that assigns the status to a
        variable typed as never for compile-time exhaustiveness checking.
      weight: 2.0
    - id: correctness
      criterion: >-
        Each union variant returns an appropriate label string.
      weight: 1.0

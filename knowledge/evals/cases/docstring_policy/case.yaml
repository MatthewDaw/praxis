# Architecture: Distillation → injection (via_ingestor-only seed path)
# Demo act: 3
# Mock candidate: extends example_add_function pattern
# Provenance target: logs/session_20260614.jsonl:102
id: docstring_policy
seed_prompt: |
  Add a function `multiply(a, b)` to calculator.py that returns the product of its
  two arguments. Do not create any other files.
target_commit: "0000000000000000000000000000000000000000"
start_commit: null
repo: null

seeded_insight:
  via_ingestor:
    - >-
      Every public function needs a docstring and a unit test before merge.
  direct_to_graph: []

deterministic_checks:
  - name: defines_multiply
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: "def multiply"
  - name: has_docstring
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: '"""'
  - name: has_test
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: "test"
  - name: produced_output
    ref: "knowledge.evals.deterministic_checks.builds:output_nonempty"

rubric:
  id: docstring_policy_v1
  items:
    - id: docstring
      criterion: >-
        multiply has a clear docstring describing its behavior.
      weight: 1.0
    - id: test
      criterion: >-
        A unit test exercises multiply with representative inputs.
      weight: 2.0

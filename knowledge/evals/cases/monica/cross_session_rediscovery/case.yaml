# Architecture: Claude Code → Session Logs → Learning Moment Detection → LLM Distillation
# Demo acts: 1 + 3 (stretch)
# Mock candidate: eval_cross_session_rediscovery
# Provenance target: fixture/session_rediscovery.jsonl:2
# Fixture: sibling fixture/session_rediscovery.jsonl — faux JSONL from prior session
id: cross_session_rediscovery
seed_prompt: |
  Add a function `status_label(status)` to enums.py that maps "open", "closed", and
  "pending" to display strings. Use a switch without a default branch that assigns
  to a variable of type never.
target_commit: "0000000000000000000000000000000000000000"
start_commit: null
repo: null

seeded_insight:
  via_ingestor:
    - >-
      Rediscovered from session logs: when switching on a discriminated union or enum,
      include a default branch assigning the value to a variable of type `never` for
      exhaustiveness checking.
  direct_to_graph: []

deterministic_checks:
  - name: uses_never_exhaustive
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: "never"
  - name: produced_output
    ref: "knowledge.evals.deterministic_checks.builds:output_nonempty"

rubric:
  id: cross_session_rediscovery_v1
  items:
    - id: exhaustive_switch
      criterion: >-
        The switch includes a default branch with a never assignment for exhaustiveness.
      weight: 2.0
    - id: maps_all_statuses
      criterion: >-
        open, closed, and pending each map to a display string.
      weight: 1.0

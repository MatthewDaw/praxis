# SCOPE conflict case. The graph holds two contradictory indentation rules, each
# scoped to a different service. The agent is told it is working in service-a, so
# it must apply the service-a rule (tabs) and ignore the service-b rule (4 spaces).
#
# Why service-a (tabs) and not service-b: 4-space is Python's default, so a
# service-b target passes even if the agent ignores the graph entirely — it
# proves nothing. Tabs are AGAINST the default, so a pass here means the scoped
# rule actively steered the agent away from what it would do on its own.
#
# needs: file_io — the test is tab indentation, which only survives faithfully in
# a written file (a real box or structured file output), not a plain chat reply
# where tabs get mangled. So this must grade answer.txt's contents, not prose.
id: scoped_conflict
needs: [file_io]
seed_prompt: |
  You are working in service-a. Write a short Python function (any small,
  self-contained function is fine) and save it to a file named answer.txt.
  Follow the project's indentation convention for the service you are
  working in. Write only the function code to answer.txt.
target_commit: "0000000000000000000000000000000000000000"  # placeholder reference
start_commit: null
repo: null

seeded_insight:
  via_ingestor: []
  direct_to_graph:
    - "In service-a use tabs."
    - "In service-b use 4 spaces."

deterministic_checks:
  - name: produced_output
    ref: "knowledge.evals.deterministic_checks.builds:output_nonempty"
  - name: defines_function
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: "def "
  - name: uses_tab_indentation
    ref: "knowledge.evals.deterministic_checks.text:regex_matches"
    params:
      pattern: "\n\t"
  - name: no_space_indentation
    ref: "knowledge.evals.deterministic_checks.text:regex_absent"
    params:
      pattern: "\n    "

rubric:
  id: scoped_conflict_v1
  items:
    - id: applies_service_a_rule
      criterion: "The function body is indented with tabs, matching the service-a rule."
      weight: 2.0
    - id: ignores_service_b_rule
      criterion: "The code does NOT use 4-space indentation (the service-b rule must not be applied)."
      weight: 2.0
    - id: valid_function
      criterion: "answer.txt contains a short, syntactically valid Python function."
      weight: 1.0

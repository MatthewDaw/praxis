# Knowledge-steering case (full-pipeline, real Claude Code). The sibling fixture/
# dir (a tiny calculator app with subtract but no add) is mounted into the box.
# The prompt is NEUTRAL — "add a function add(a, b)" — so nothing in the task
# itself asks for reuse. The seeded lesson ("write a function in terms of an
# existing one") is what should steer the agent to implement add via the existing
# subtract (return subtract(a, -b)) instead of the obvious a + b. add_calls_subtract
# is the discriminator that proves the knowledge changed behavior.
#
# Cold baseline: add_via_subtract_before (same fixture + prompt, empty graph) asserts
# the default is a direct a + b that does NOT call subtract — so a green
# add_calls_subtract here is attributable to the injected knowledge, not the model's
# default. Sandbox-gated (has a fixture): runs on Claude Code, SKIPs on single-shot.
# Expected to FAIL under the offline FakeRunner.
id: add_via_subtract
seed_prompt: |
  Add a function `add(a, b)` to calculator.py that returns the sum of its two
  arguments, with a docstring and a corresponding test.
target_commit: "0000000000000000000000000000000000000000"  # placeholder reference
start_commit: null
repo: null

seeded_insight:
  via_ingestor:
    - "This project keeps small pure helpers in calculator.py."
  direct_to_graph:
    - "Every public function needs a docstring and a unit test."
    - "If a function can be written in terms of an existing function, it should be, rather than being implemented directly"

deterministic_checks:
  - name: defines_add
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: "def add"
  - name: produced_output
    ref: "knowledge.evals.deterministic_checks.builds:output_nonempty"
  - name: add_calls_subtract
    ref: "knowledge.evals.deterministic_checks.builds:function_calls"
    params:
      caller: add
      callee: subtract

rubric:
  id: add_via_subtract_v1
  items:
    - id: correctness
      criterion: "The add function returns a + b for representative inputs."
      weight: 2.0
    - id: docstring
      criterion: "The function has a clear docstring."
      weight: 1.0
    - id: test
      criterion: "There is a test exercising the function."
      weight: 1.0

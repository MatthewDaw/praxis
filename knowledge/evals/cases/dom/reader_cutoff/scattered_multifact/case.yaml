# RECALL-UNDER-NOISE eval: graph_reader. Three relevant facts (the conventions for
# writing a Python helper) are seeded alongside clearly-unrelated FAR distractors.
# The query is the task; the RetrievingReader must surface ALL THREE conventions
# (recall — even the weakest) and drop every distractor (precision).
#
# This is the FAR-only version (clearly-unrelated distractors) — expected to PASS.
# Its sibling scattered_multifact_near uses adjacent same-topic distractors to probe
# the relative-cutoff boundary (provisional).
#
# Isolation (§5.1): reader_abs_floor=0 disables the floor so the RELATIVE cutoff
# alone must (a) keep all three relevant conventions and (b) drop the distractors —
# this is the constraint that the relative ratio must not cut the weakest relevant.
#
# embedder: cached -> committed real-vector fixture; offline/CI. Regenerate with
# `embed_cache --refresh`.
id: scattered_multifact
component: graph_reader
substrate: vector
reader: retrieving
embedder: cached
reader_top_k: 8
reader_abs_floor: 0  # floor OFF — isolate the relative cutoff (recall-under-noise)
seed_prompt: "What are the code style and file conventions for a Python source file?"

seeded_insight:
  direct_to_graph:
    # relevant: the three conventions — all must survive (recall). Uniformly framed
    # as "source file convention" so all three cluster clearly above the cutoff.
    - "Source file convention: use snake_case for all function and variable names."
    - "Source file convention: define exactly one top-level function per file."
    - "Source file convention: end every source file with a single trailing newline."
    # FAR distractors: clearly unrelated — must be dropped (precision)
    - "Static assets are served from CloudFront with a 24-hour cache header."
    - "Email is sent through SES with templated messages."
    - "The default AWS region for all stacks is us-east-1."
    - "The brand primary color is the CSS variable --color-primary."

deterministic_checks:
  # recall — all three conventions surface
  - name: recalls_snake_case
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params: {text: "snake_case"}
  - name: recalls_one_function
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params: {text: "one top-level function"}
  - name: recalls_trailing_newline
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params: {text: "trailing newline"}
  # precision — far distractors dropped
  - name: drops_cloudfront
    ref: "knowledge.evals.deterministic_checks.builds:not_contains_text"
    params: {text: "CloudFront"}
  - name: drops_ses
    ref: "knowledge.evals.deterministic_checks.builds:not_contains_text"
    params: {text: "SES"}

# Component eval: graph_reader — the AFTER of the deterministic reader pair, and
# the CI-verified contract that retrieval ranks. Same ~18-fact noisy graph as the
# control lost_in_middle_reader_before; the only variable is the reader.
#
# RetrievingReader (vector substrate + real embeddings, replayed from the
# committed cache) searches the graph for "add a caching TODO" and returns only
# the relevant facts: the TODO(MD) rule and the caching rule survive, while the
# irrelevant facts (X-Ray, SES, CloudFront) fall below the relevance cutoff and
# are dropped -> the excludes_* checks pass. The before-control proves the dumb
# reader fails the same checks. Model-free and agent-free, so this pair is the
# robust, CI-runnable contract; the lost_in_middle pair is the end-to-end demo.
#
# `embedder: cached` => replays the committed real-vector fixture, so it runs in
# CI offline and deterministically. Regenerate with `embed_cache --refresh`.
#
# Calibrated against openai/text-embedding-3-small: the relevant facts score
# Caching 0.52 / TODO(MD) 0.45; the distractors CloudFront 0.27 / X-Ray 0.18 /
# SES 0.06. With reader_abs_floor=0 (floor OFF), the relative cutoff ALONE does the
# work: 0.75 * 0.52 = 0.39 keeps both rules and drops all three distractors
# (top_k alone would not — CloudFront ranks 3rd). Recalibrate if the model changes.
#
# Mechanism isolation (§5.1): disabling the floor forces the relative cutoff to drop
# the distractors, so this case is sensitive to it — with the real floor (0.30),
# the floor would drop CloudFront (0.27) by itself and mask a broken relative cutoff.
# This asserts a narrower *sufficient* condition; the production triple (floor 0.30 +
# ratio 0.75) also passes. The reader cutoff is now a settled system contract, so
# the prior PROVISIONAL note is removed.
id: lost_in_middle_reader
component: graph_reader
substrate: vector
reader: retrieving
embedder: cached
reader_top_k: 8
reader_abs_floor: 0  # floor OFF — isolate the relative cutoff (it alone drops CloudFront/X-Ray/SES)
seed_prompt: "Add a TODO comment about adding caching to the data-fetch layer."

seeded_insight:
  direct_to_graph:
    - "The praxis service is a FastAPI app deployed on AWS via CDK."
    - "Local development uses uv; run the app with `uv run uvicorn app:api`."
    - "Secrets are read from AWS Secrets Manager, never committed to the repo."
    - "The default region for all stacks is us-east-1."
    - "Python files are formatted with ruff and use 4-space indentation."
    - "Type hints are required on all public function signatures."
    - "Database access goes through the repository layer, never raw SQL in routes."
    - "PRs require at least one approving review before merge."
    - "Logging uses structlog with JSON output in production."
    - "ALWAYS prefix every TODO comment with the initials MD, like TODO(MD)."
    - "Caching, when added, should use an in-memory LRU with a 60-second TTL."
    - "API responses are versioned under the /v1 prefix."
    - "All timestamps are stored and returned in UTC ISO-8601 format."
    - "Rate limiting is applied per-API-key at the gateway, 100 req/min."
    - "Static assets are served from CloudFront with a 24-hour cache header."
    - "Email is sent through SES with templated messages."
    - "Tracing uses AWS X-Ray with sampling at 10% in production."
    - "CORS is restricted to the known frontend origins only."

deterministic_checks:
  # The relevant rule must survive (a good reader keeps it; the dumb one does too).
  - name: retrieves_todo_rule
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: "TODO(MD)"
  # Irrelevant facts must be dropped. Today they are NOT (whole graph returned).
  - name: excludes_xray
    ref: "knowledge.evals.deterministic_checks.builds:not_contains_text"
    params:
      text: "X-Ray"
  - name: excludes_ses
    ref: "knowledge.evals.deterministic_checks.builds:not_contains_text"
    params:
      text: "SES"
  - name: excludes_cloudfront
    ref: "knowledge.evals.deterministic_checks.builds:not_contains_text"
    params:
      text: "CloudFront"

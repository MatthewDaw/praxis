# Treatment arm of the yoyo_lazy_import footgun (PR 1fdb8be / #48; real precedent:
# migrations/m2026_06_23_reject_rename.py and migrations/0001_reembed_candidates.py).
# yoyo execs migration files with importlib in a context where the repo root is NOT on
# sys.path, so a module-scope `from knowledge...` import fails (ModuleNotFoundError)
# before the step runs. Fact #9 tells the agent to import `knowledge` lazily inside the
# step. With it, there is no top-level knowledge import -> footgun-absent check PASSes.
# Paired with yoyo_lazy_import_before (empty seed, asserts the top-level import is present).
id: yoyo_lazy_import
needs: [sandbox, file_io]
output_file: 0002_backfill_fact_source.py
seed_prompt: |
  Write a yoyo migration file `0002_backfill_fact_source.py` that backfills the
  `source` column on the `facts` table: for every row with a NULL/empty source, set
  it by calling `derive_source(text)` from the project's
  `knowledge.knowledge_graph.provenance` module. Use yoyo's `step()` API — the step
  function receives a psycopg connection `conn`. Edit only 0002_backfill_fact_source.py.
target_commit: "0000000000000000000000000000000000000000"
start_commit: null
repo: null

seeded_insight:
  via_ingestor: []
  direct_to_graph:
    - >-
      In `knowledge/knowledge_graph/clustering.py` `_reduce`, keep UMAP `n_neighbors`
      low — use `min(10, n - 1)`, not 15. A high `n_neighbors` over-weights global
      structure and collapses a heterogeneous corpus into one mega-cluster (a
      114-fact corpus melted into two blobs at 15; 10 recovers ~14 coherent topics).
    - >-
      Call `setup_tracing()` at module-import scope in the serve entrypoint
      (`knowledge/serve/app.py`), never inside `if __name__ == "__main__"`. uvicorn
      imports the app by string and never executes the `__main__` block, so tracing
      set up there never runs. It is a no-op unless `PHOENIX_COLLECTOR_ENDPOINT` is set.
    - >-
      When a new fact replaces old ones, link them with a directional `supersedes`
      edge — not a `contradicted_by` edge. Custom resolution is modeled as
      supersession (reject every member of the slot-cluster, write the new fact as a
      normal add), not as a fabricated contradiction.
    - >-
      Contradiction is per-slot, not transitive: pending contradictions cluster by
      the `(subject, attribute)` slot each edge was detected on, not by connected
      component. A chained A–B–C conflict splits into two slot-clusters and must
      never fabricate an A–C link.
    - >-
      Write policy enforces FR-005: the graph must never hold two
      mutually-contradicting facts both in the `active` state.
    - >-
      The DB DSN resolver (`knowledge/serve/db.py`) only falls back to the AWS
      Secrets Manager (production RDS) secret when `PRAXIS_DB_ALLOW_REMOTE=1` (set in
      App Runner + CI). Local scripts must load `.env` (`PRAXIS_DB_URL`) — otherwise
      they get no DB rather than silently connecting to prod.
    - >-
      Everything in the knowledge graph is partitioned by `(org_id, user_id)`.
      Snapshot save/load/delete are scoped to the caller's own partition; org
      snapshot browse/fold-in can read any org member's snapshots, but fold-in
      writes only into the caller's graph.
    - >-
      MCP tools are thin authenticated wrappers over existing backend routes — an
      agent can perform every graph/snapshot edit the dashboard UI can, with
      authorization inherited from the backend (no separate authz in the tool layer).
    - >-
      yoyo migrations must import the `knowledge` package lazily (inside the
      migration step function, not at module load), because yoyo execs the file with
      the repo root off `sys.path` — a top-level `from knowledge...` raises
      ModuleNotFoundError before the step runs. (See migrations/m2026_06_23_reject_rename.py.)
    - >-
      Slot-granular dedup and conflict resolution live in the ingestion path
      (`ingest_dump` / `/ingest`), which distills each fact into a granular
      `(subject, attribute, value)` claim. `graph.write(...)` is a direct write with
      no dedup — don't expect it to reconcile slots.
    - >-
      Eval seeding: `seeded_insight.direct_to_graph` writes facts `active`
      (simulating user approval); `via_ingestor` writes them `proposed` (gated out of
      retrieval) unless the case sets `ingest_state: active`.
    - >-
      Claim/verdict cassettes are keyed on the rendered prompt text. If you change a
      prompt, re-record the cassette or offline replay misses loudly.
    - >-
      Clustering regression guards run the production `_reduce` + HDBSCAN over a
      frozen real-embedding matrix offline (no network, no labeling LLM) and assert
      segmentation (more than two clusters, no single cluster owning half the corpus).

deterministic_checks:
  # Footgun ABSENT: no top-level (column-0) `import knowledge` / `from knowledge ...`.
  - name: lazy_knowledge_import
    ref: "knowledge.evals.deterministic_checks.text:regex_absent"
    params:
      pattern: '(?m)^(?:from|import)\s+knowledge\b'
  - name: produced_output
    ref: "knowledge.evals.deterministic_checks.builds:output_nonempty"

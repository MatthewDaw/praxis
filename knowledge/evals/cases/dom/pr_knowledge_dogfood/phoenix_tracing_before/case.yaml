# Control arm of the phoenix_tracing footgun (commit 22db05f).
# Empty seed. Positive-assertion control: asserts the footgun is PRESENT — there is
# NO module-scope setup_tracing() call (the cold agent puts it in __main__, or omits
# it). A clean PASS means the footgun fired. A FAIL means the blind agent placed the
# call at module scope anyway (footgun not blind-tempting — see README validity note).
id: phoenix_tracing_before
needs: [sandbox, file_io]
output_file: app.py
seed_prompt: |
  Wire up Phoenix / OpenTelemetry tracing for this FastAPI service so that LLM and
  embedding spans are exported when the app runs under uvicorn (which imports the
  app by string, e.g. `uvicorn app:api`). A helper is available as
  `from knowledge.observability.tracing import setup_tracing` — it is a no-op unless
  PHOENIX_COLLECTOR_ENDPOINT is set. Import it and call it in the right place so the
  spans actually export when served. Edit only app.py.
target_commit: "0000000000000000000000000000000000000000"
start_commit: null
repo: null

seeded_insight:  # deliberately empty: cold-graph control
  via_ingestor: []
  direct_to_graph: []

deterministic_checks:
  # Footgun PRESENT: no module-scope setup_tracing() call (col-0 call is absent).
  - name: no_module_scope_tracing
    ref: "knowledge.evals.deterministic_checks.text:regex_absent"
    params:
      pattern: '(?m)^setup_tracing\(\)'
  - name: produced_output
    ref: "knowledge.evals.deterministic_checks.builds:output_nonempty"

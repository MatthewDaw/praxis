# Component eval: ingestion only (no agent). Feeds the SAME lesson TWICE, phrased
# differently (trivial wording variation) but sharing the load-bearing phrase
# "use uv run pytest". Runs on the vector substrate, so it exercises the real
# write policy (Redactor -> Deduper). The two phrasings sit at ~0.65 cosine
# (text-embedding-3-small): the loose recall gate (recall_floor 0.45) surfaces the
# paraphrase as a candidate, and the MergeJudge confirms "same lesson" -> the two
# merge into one verbatim survivor, so "use uv run pytest" appears once and
# occurs_at_most(n=1) PASSES. Replays from the committed merge cassette offline.
# (Pairs with ingestion_dedup, the exact-match arm.)
id: ingestion_merge_near_dupes
component: ingestion
substrate: vector
embedder: cached  # real vectors so the recall gate finds the ~0.65 paraphrase candidate
merge_model: openai/gpt-4o-mini  # MergeJudge decides same-lesson; replayed from the committed cassette

seeded_insight:
  via_ingestor:
    - "To run the test suite locally, use uv run pytest before pushing."
    - "Before opening a PR, use uv run pytest to make sure the suite is green."

deterministic_checks:
  - name: near_dupes_merged
    ref: "knowledge.evals.deterministic_checks.text:occurs_at_most"
    params:
      text: "use uv run pytest"
      n: 1

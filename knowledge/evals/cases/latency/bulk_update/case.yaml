# LATENCY: bulk metadata edits (the praxis_edit_fact path) must be wicked fast
# AND must not re-embed. A title/meta-only edit changes no content, so it should
# never pay for an embedding. The check drives the REAL FactsCandidates.update N
# times (title rename only) in an isolated tenant behind a call-counting
# FakeEmbedder, and gates on BOTH an amortized per-op ceiling and ZERO embed
# calls across the timed edits.
#
# The embed-count gate exposes a latency trap wall-clock alone hides offline:
# FactsCandidates.update reads the existing text and passes it back to
# update_fact, which re-embeds whenever text is not None -- so a pure rename pays
# a full embedding (a network round-trip in prod) for nothing. Expected RED until
# the edit path skips embedding when content is unchanged.
#
# Component eval (no agent). embedder: cached gates the case on a reachable
# Postgres store (SKIP otherwise); the check itself uses a FakeEmbedder.
id: bulk_update_latency
component: knowledge_graph
substrate: vector
embedder: cached

deterministic_checks:
  - name: bulk_update_latency
    ref: "knowledge.evals.deterministic_checks.latency:bulk_update_latency"
    params:
      n: 50
      per_op_ms: 150.0

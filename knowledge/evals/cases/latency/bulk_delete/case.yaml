# LATENCY: bulk delete (the praxis_delete_fact path) must be the fastest mutation
# of all -- a get_fact guard plus a single DELETE (edges cascade), no model call.
# The check seeds N proposed facts (not timed; proposed/rejected are deletable
# without a reject first), then times FactsCandidates.delete over all of them in
# an isolated tenant, asserting the tightest amortized per-op ceiling and
# reporting the measured ms/op.
#
# Component eval (no agent). embedder: cached gates the case on a reachable
# Postgres store (SKIP otherwise); the check itself uses a FakeEmbedder.
id: bulk_delete_latency
component: knowledge_graph
substrate: vector
embedder: cached

deterministic_checks:
  - name: bulk_delete_latency
    ref: "knowledge.evals.deterministic_checks.latency:bulk_delete_latency"
    params:
      n: 50
      per_op_ms: 100.0

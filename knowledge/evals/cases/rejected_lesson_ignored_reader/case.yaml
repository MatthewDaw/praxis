# Component eval: graph_reader only — the deterministic decay-filter red spec.
# Diagram node: get context + decay filter (PC-9)
# Provenance target: logs/evals/monica/rejected_lesson_ignored.jsonl:1
# Both the active lesson and the rejected rival are seeded. Today's WholeFileReader
# returns the whole graph, so excludes_rejected_rival_marker FAILS (the rival's
# marker is in the reader output) — hence xfail. When a FilteredReader drops
# rejected insights at read time, the marker disappears and this XPASSes.
id: rejected_lesson_ignored_reader
component: graph_reader
xfail: "no FilteredReader: the reader returns all insights, rejected rival included"
seed_prompt: "What is the project standard for config path handling?"

seeded_insight:
  direct_to_graph:
    - >-
      ACTIVE_PATHLIB_STANDARD: Stop using os.path for new code — use pathlib.Path;
      it's the project standard.
    - >-
      REJECTED_RIVAL_MARKER: Always use os.path.join and os.path.exists for config
      paths — legacy standard.

deterministic_checks:
  - name: retrieves_active_marker
    ref: "knowledge.evals.deterministic_checks.builds:contains_text"
    params:
      text: "ACTIVE_PATHLIB_STANDARD"
  - name: excludes_rejected_rival_marker
    ref: "knowledge.evals.deterministic_checks.builds:not_contains_text"
    params:
      text: "REJECTED_RIVAL_MARKER"

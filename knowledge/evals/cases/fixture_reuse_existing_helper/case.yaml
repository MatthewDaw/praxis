# Reuse-steering case (full-pipeline, real Claude Code). fixtures/utils.py ships a
# working slugify() helper. The prompt is NEUTRAL — it never mentions utils.py or
# mandates reuse — so the seeded knowledge ("reuse utils helpers; utils.py provides
# slugify") is what should steer the agent to import slugify rather than write its
# own. The agent writes answer.py; output_file scopes grading to THAT file, not the
# box-sweep (which would otherwise read slugify( straight out of the fixture and
# pass the check no matter what the agent did).
#
# Cold baseline: fixture_reuse_existing_helper_before (same fixture + prompt, empty
# graph) shows the default is to reimplement the slug inline — so a green
# calls_slugify here is attributable to the injected knowledge. Sandbox-gated
# (fixture + writes_file); runs on Claude Code, SKIPs on single-shot.
id: fixture_reuse_existing_helper
output_file: answer.py
seed_prompt: |
  Write a short Python script to answer.py that takes the title
  "Hello, World! My First Post", produces its URL-safe slug, and prints it.
  Write only the script to answer.py.
target_commit: "0000000000000000000000000000000000000000"
seeded_insight:
  direct_to_graph:
    - "Convention: reuse helpers in utils.py; never reimplement them."
    - "utils.py provides slugify(text) for producing URL-safe slugs."
deterministic_checks:
  - name: wrote_answer
    ref: knowledge.evals.deterministic_checks.builds:writes_file
    params:
      path: answer.py
  - name: calls_slugify
    ref: knowledge.evals.deterministic_checks.builds:contains_text
    params:
      text: "slugify("
  - name: does_not_reimplement_slugify
    ref: knowledge.evals.deterministic_checks.text:forbids_substring
    params:
      text: "def slugify"

# Component eval: ingestion only (no agent). Feeds the SAME line through the
# Ingestor twice and reads the resulting graph. Runs on the vector substrate, so
# the write policy's Deduper collapses the byte-identical duplicate (exact match
# works even with the offline FakeEmbedder): "uv run pytest" appears once and
# occurs_at_most(n=1) PASSES. This is the exact-match arm; ingestion_merge_near_dupes
# is the paraphrase arm that stays XFAIL offline until a real embedder is wired.
id: ingestion_dedup
component: ingestion
substrate: vector

seeded_insight:
  via_ingestor:
    - "Use uv run pytest to run tests."
    - "Use uv run pytest to run tests."

deterministic_checks:
  - name: no_duplicate_insight
    ref: "knowledge.evals.deterministic_checks.text:occurs_at_most"
    params:
      text: "uv run pytest"
      n: 1

# Component eval: ingestion only (no agent). Feeds the SAME line through the
# Ingestor twice and reads the resulting graph. This is an EXPECTED-FAIL
# baseline documenting the missing dedup capability: today the graph appends
# duplicate insights, so "uv run pytest" appears twice and occurs_at_most(n=1)
# FAILS. When dedup is added, the duplicate is collapsed and this case PASSES.
id: ingestion_dedup
component: ingestion
substrate: vector

seeded_insight:
  via_ingestor:
    - "Use uv run pytest to run tests."
    - "Use uv run pytest to run tests."

deterministic_checks:
  - name: no_duplicate_insight
    ref: "knowledge.evals.deterministic_checks.text:occurs_at_most"
    params:
      text: "uv run pytest"
      n: 1

services:
  - type: web
    name: praxis-candidate-api
    repo: https://labs.gauntletai.com/monicapeters/praxis.git
    branch: monica/dashboard-human-gate
    runtime: python
    plan: free
    buildCommand: pip install . && python scripts/export-render-seed.py
    startCommand: uvicorn knowledge.serve.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - knowledge/serve/**
        - knowledge/knowledge_graph/**
        - knowledge/injestion/**
        - knowledge/llm/**
        - pyproject.toml
        - frontend/mock_data.py
        - scripts/export-render-seed.py
        - scripts/export-mock-candidates.py
    envVars:
      - key: PRAXIS_API_HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: "3.12"
      # Cognito (PraxisAuthUserPoolStack outputs) — used to verify JWTs.
      - key: COGNITO_USER_POOL_ID
        value: us-east-1_dqDCickOP
      - key: COGNITO_CLIENT_ID
        value: 3v12800pitg5l6tm4er2qati8g
      - key: COGNITO_REGION
        value: us-east-1

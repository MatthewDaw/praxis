# Positive control for R-CONTRACT-SIGNED: a closed plan slice WITH a signed contract (evaluator
# actions recorded) is ADMITTED. Exercises the pass-path of the new contract field threaded into
# evaluate_plan — signed=true AND actions_recorded=true, so the rule stands down.
id: plan_gate_contract_signed_admitted
component: plan_gate
input:
  project: team-app
  contract:
    signed: true
    actions_recorded: true
  requirements:
    - id: R1
      text: "A submission is completed when the daily rep AND all three ratings are submitted."
      acceptance: "completed=true iff rep present and effort/focus/support all non-None."
      defines: ["daily completion"]
      references: []
      source: "prd-team-app"
  out_of_scope: []
rule_ids: ["R-ACCEPT-BINARY", "R-NO-VAGUE", "R-NO-DANGLING", "R-HAS-SOURCE", "R-CONTRACT-SIGNED"]
deterministic_checks:
  - name: gate_admits
    ref: "evals.checks:gate_admits"

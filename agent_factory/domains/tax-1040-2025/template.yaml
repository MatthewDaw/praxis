# Output template: how the evaluator's computed lines become the deliverable.
# Consumed by the generic FORM-FILL seam (one of the two shared code seams).
#
# Field-name strategy (S7): the official IRS AcroForm field names are positional and shift
# year to year, so they are NOT hardcoded here. The form-fill seam extracts the field map from
# f1040.pdf at startup and resolves each `line` below to its actual field. This template maps
# stable LINE KEYS (from compute.yaml) to the form's logical 1040 lines.

source_form:
  primary: "irs-pdf/f1040.pdf"            # official current-year AcroForm
  fallback: "irs-prior/f1040--2024.pdf"   # prior-year if field names drift
  on_total_failure: reportlab_1040_shaped # last resort: a 1040-shaped rendered PDF
  flatten_on_output: true

# compute.yaml step id  ->  Form 1040 line the value is written to.
line_map:
  line_1a_wages: "1a"
  line_8_other_income: "8"
  line_9_total_income: "9"
  line_11_agi: "11"
  line_12_standard_deduction: "12"
  line_15_taxable_income: "15"
  line_16_tax: "16"
  line_24_total_tax: "24"
  line_25a_withholding: "25a"
  line_33_total_payments: "33"
  line_34_refund: "34"
  line_37_amount_owed: "37"

identity_fields:                  # non-computed header fields
  taxpayer_name: { from: { field: employee_name } }
  filing_status: { from: { field: filing_status }, render: rules.filing_status_labels }

# S2 — every written value carries provenance {value, source, source_id}. The form-fill seam
# derives source from how the requirement was covered: w2 | user | default | engine | kg.
provenance: per_line

# S5 — Assumption Receipt: bundled with the PDF. One line per requirement closed by `default:*`,
# citing the justification from policy.yaml defaults. Generated by af-fulfill, not authored here.
assumption_receipt:
  include: true
  source: closed_by_default       # the requirements af-fulfill defaulted rather than asked

# S10 — determinism: same validated inputs -> byte-identical PDF -> same hash, shown in the UI.
output_hash:
  algorithm: sha256
  over: [computed_lines, identity_fields, assumption_receipt]

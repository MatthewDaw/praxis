services:
  - type: web
    name: praxis-candidate-api
    repo: https://labs.gauntletai.com/monicapeters/praxis.git
    branch: monica/dashboard-human-gate
    runtime: python
    plan: free
    buildCommand: pip install . && python scripts/export-render-seed.py && python scripts/export-mock-candidates.py
    startCommand: uvicorn knowledge.serve.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - knowledge/serve/**
        - knowledge/knowledge_graph/**
        - knowledge/injestion/**
        - knowledge/llm/**
        - pyproject.toml
        - knowledge/evals/cases/**
        - frontend/eval_mock_bridge.py
        - frontend/mock_data.py
        - scripts/export-render-seed.py
        - scripts/export-mock-candidates.py
        - docs/integration/fixtures/eval-metrics.json
    envVars:
      - key: PRAXIS_API_HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PRAXIS_DB_URL
        sync: false
      # Cognito (PraxisAuthUserPoolStack outputs) — used to verify JWTs.
      - key: COGNITO_USER_POOL_ID
        value: us-east-1_4nAMe6bPK
      - key: COGNITO_CLIENT_ID
        value: 3ij653bq912pi4f17l5hn9iqqn
      - key: COGNITO_REGION
        value: us-east-1

  # Monica-owned read-only Phoenix proxy. Holds the Phoenix Bearer key
  # server-side so it never ships in the static React bundle. Separate from
  # praxis-candidate-api so the dashboard pillar owns this without touching
  # Matthew's knowledge/serve app.
  - type: web
    name: praxis-phoenix-proxy
    repo: https://labs.gauntletai.com/monicapeters/praxis.git
    branch: monica/dashboard-human-gate
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn frontend.phoenix_proxy.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - frontend/phoenix_proxy/**
        - pyproject.toml
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # Phoenix REST API connection (read-only). Set as secrets in the Render
      # dashboard — Dominic provides the project identifier and read-only key.
      - key: PHOENIX_BASE_URL
        value: https://phoenix.praxiskg.com
      - key: PHOENIX_PROJECT
        sync: false
      - key: PHOENIX_API_KEY
        sync: false

  - type: web
    name: praxis-react-human-gate
    repo: https://labs.gauntletai.com/monicapeters/praxis.git
    branch: monica/dashboard-human-gate
    rootDir: frontend-react
    runtime: static
    buildCommand: cd .. && pip install . && python scripts/export-mock-candidates.py && cd frontend-react && npm ci && npm run build:render
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - frontend-react/**
        - frontend/mock_data.py
        - frontend/eval_mock_bridge.py
        - knowledge/evals/cases/**
        - scripts/export-mock-candidates.py
        - docs/integration/fixtures/eval-metrics.json
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_PRAXIS_API_BASE_URL
        fromService:
          type: web
          name: praxis-candidate-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_PRAXIS_POSTGRES_API_BASE_URL
        fromService:
          type: web
          name: praxis-candidate-api
          envVarKey: RENDER_EXTERNAL_URL
      # Phoenix trace proxy URL — Candidate Detail fetches trace context here.
      - key: VITE_PRAXIS_PHOENIX_PROXY_URL
        fromService:
          type: web
          name: praxis-phoenix-proxy
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_PRAXIS_API_TOKEN
        sync: false
      - key: VITE_PRAXIS_CONTRACT_VERSION
        value: "1"
      # Cognito (PraxisAuthUserPoolStack outputs) — public SPA client config.
      - key: VITE_COGNITO_USER_POOL_ID
        value: us-east-1_4nAMe6bPK
      - key: VITE_COGNITO_CLIENT_ID
        value: 3ij653bq912pi4f17l5hn9iqqn
      - key: VITE_COGNITO_REGION
        value: us-east-1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

services:
  - type: web
    name: praxis-react-human-gate
    repo: https://github.com/monigarr/praxis/tree/main
    branch: monica/dashboard-human-gate
    rootDir: frontend-react
    runtime: static
    plan: starter
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - frontend-react/**
      ignoredPaths:
        - frontend-react/**/*.md
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_PRAXIS_API_BASE_URL
        sync: false
      - key: VITE_PRAXIS_API_TOKEN
        sync: false
      - key: VITE_PRAXIS_CONTRACT_VERSION
        value: "1"
      - key: VITE_PRAXIS_EVAL_METRICS_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

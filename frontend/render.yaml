services:
  - type: web
    name: praxis-human-gate
    rootDir: frontend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: PRAXIS_API_BASE_URL
        sync: false
      - key: PRAXIS_API_TOKEN
        sync: false
      - key: PRAXIS_EVAL_METRICS_URL
        sync: false
